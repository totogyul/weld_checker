name: Windows EXE 빌드

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt pyinstaller

      - name: EXE 빌드
        run: >
          pyinstaller
          --onefile
          --noconsole
          --add-data "templates;templates"
          --name "용접오매칭검사기"
          app.py

      - name: Release 생성 및 EXE 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 최신 버전
          files: dist/용접오매칭검사기.exe
          prerelease: false
