name: Windows EXE 빌드

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt pyinstaller

      - name: EXE 빌드
        run: >
          pyinstaller
          --onefile
          --noconsole
          --add-data "templates;templates"
          --name "용접오매칭검사기"
          app.py

      - name: EXE 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: 용접오매칭검사기
          path: dist/용접오매칭검사기.exe
          retention-days: 30
